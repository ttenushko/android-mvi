plugins {
    id 'com.android.library'
    id 'kotlin-android'
}

archivesBaseName = "mvi-android"
version = "$MVI_ANDROID_VERSION_NAME"

android {
    compileSdkVersion toolVersions.android.compileSdk

    defaultConfig {
        minSdkVersion toolVersions.android.minSdk
        targetSdkVersion toolVersions.android.targetSdk
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles 'consumer-rules.pro'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
        freeCompilerArgs += '-Xexplicit-api=strict'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation project(':mvi-core')
    implementation deps.kotlinx.coroutines
    implementation deps.support.appCompat
    implementation deps.support.viewModelKtx

    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test:runner:1.1.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.1'
}

android.libraryVariants.all { variant ->
    variant.outputs.each { output ->
        if (output.outputFileName != null && output.outputFileName.endsWith('.aar')) {
            def fileName = "${archivesBaseName}-${version}-${variant.buildType.name}.aar"
            output.outputFileName = fileName
        }
    }
}